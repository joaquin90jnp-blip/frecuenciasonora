<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Frecuencia Sonora</title>
    <link rel="stylesheet" href="./css/Style.css">
</head>
<body>

    <header>
        <h1><img src="./img/frecuenciasonora.png" alt="Logo de Frecuencia Sonora"></h1>
        <h2>Contáctenos</h2>
        <nav>
            <ul>
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./productos.html">Productos</a></li>
                <li><a href="#">Contacto</a></li>
                <li><a href="./cursos.html">cursos</a></li>
                <li><a href="./preguntas frecuentes.html">Preguntas frecuentes</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contacto">
            <h2>Envíanos tu consulta</h2>

            <form action="#" method="post">
                <fieldset>
                    <legend>Datos Personales</legend>
                    
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                    
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required>
                    
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </fieldset>
                
                <fieldset>
                    <legend>Tu consulta es por:</legend>
                    
                    <input type="radio" id="audio" name="consulta" value="equipos-audio" required>
                    <label for="audio">Equipos de Audio</label><br>
                    
                    <input type="radio" id="instrumentos" name="consulta" value="instrumentos-musicales">
                    <label for="instrumentos">Instrumentos musicales</label><br>
                    
                    <input type="radio" id="iluminacion" name="consulta" value="iluminacion">
                    <label for="iluminacion">Iluminación</label><br>
                </fieldset>

                <button type="submit" class="btn-enviar">Enviar consulta</button>
            </form>
        </section>
    </main>

    <footer>
        <section class="redes">
            <h4>Seguinos en nuestras redes</h4>
            <ul>
                <li><a href="https://www.instagram.com/" target="_blank">Instagram</a></li>
                <li><a href="https://www.facebook.com" target="_blank">Facebook</a></li>
                <li><a href="https://www.x.com" target="_blank">X</a></li>
            </ul>
        </section>

        <section class="ubicacion">
            <h4>Nos ubicamos en:</h4>
            <address>AV. juramento 2380, CABA</address>
            <div class="mapa-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3285.668193318758!2d-58.45625080000001!3d-34.5619556!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95bcb5d39cbb1adf%3A0x50f33f5d575a2d27!2sAv.%20Juramento%202380%2C%20C1428%20Cdad.%20Aut%C3%B3noma%20de%20Buenos%20Aires!5e0!3m2!1ses!2sar!4v1768664266090!5m2!1ses!2sar" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>
    </footer>
</body>
</html>
